train:
  _target_: fastwam.datasets.logical_concat_dataset.LogicalConcatDataset
  _recursive_: false
  shape_meta: &robotwin_shape_meta
    images:
      - key: cam_high
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_left_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_right_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
    action:
      - key: default
        raw_shape: 14
        shape: 14
    state:
      - key: default
        raw_shape: 14
        shape: 14
  num_frames: 33
  global_sample_stride: 1
  action_video_freq_ratio: 4
  video_size: [384, 320]
  camera_key: null
  val_set_proportion: 0.01
  pretrained_norm_stats: ./data/robotwin2.0/dataset_stats.json
  text_embedding_cache_dir: ./data/text_embeds_cache/robotwin_actorseg_concat
  context_len: 128
  concat_multi_camera: "robotwin"
  processor:
    action_output_dim: 14
    proprio_output_dim: 14
  stratified_batch:
    enabled: true
    child_indices: [1]
    min_fraction: 0.10
  datasets:
    - repeat: 1
      dataset:
        _target_: fastwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
        dataset_dirs:
          - ./data/robotwin2.0/robotwin2.0
        shape_meta: ${data.train.shape_meta}
        num_frames: ${data.train.num_frames}
        global_sample_stride: ${data.train.global_sample_stride}
        action_video_freq_ratio: ${data.train.action_video_freq_ratio}
        video_size: ${data.train.video_size}
        camera_key: ${data.train.camera_key}
        val_set_proportion: ${data.train.val_set_proportion}
        is_training_set: true
        pretrained_norm_stats: ${data.train.pretrained_norm_stats}
        skip_padding_as_possible: false
        concat_multi_camera: ${data.train.concat_multi_camera}
        text_embedding_cache_dir: ${data.train.text_embedding_cache_dir}
        context_len: ${data.train.context_len}
        override_instruction: null
        fallback_on_error: false
        processor: &robotwin_processor
          _target_: fastwam.datasets.lerobot.processors.fastwam_processor.FastWAMProcessor
          shape_meta: ${data.train.shape_meta}
          num_obs_steps: ${data.train.num_frames}
          num_output_cameras: 3
          action_output_dim: 14
          proprio_output_dim: 14
          action_state_transforms: null
          use_stepwise_action_norm: false
          norm_default_mode: "z-score"
          norm_exception_mode: null
          action_state_merger:
            _target_: fastwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign
          train_transforms:
            - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
            - _target_: torchvision.transforms.Resize
              size: [240, 320]
          val_transforms:
            - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
            - _target_: torchvision.transforms.Resize
              size: [240, 320]
    - repeat: 1
      dataset:
        _target_: fastwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
        dataset_dirs:
          - ./data/robotwin2_actorseg/robotwin2.0
        shape_meta: ${data.train.shape_meta}
        num_frames: ${data.train.num_frames}
        global_sample_stride: ${data.train.global_sample_stride}
        action_video_freq_ratio: ${data.train.action_video_freq_ratio}
        video_size: ${data.train.video_size}
        camera_key: ${data.train.camera_key}
        val_set_proportion: ${data.train.val_set_proportion}
        is_training_set: true
        pretrained_norm_stats: ${data.train.pretrained_norm_stats}
        skip_padding_as_possible: false
        concat_multi_camera: ${data.train.concat_multi_camera}
        text_embedding_cache_dir: ${data.train.text_embedding_cache_dir}
        context_len: ${data.train.context_len}
        prompt_template: "A robot video rendered as actor segmentation masks from high, left wrist, and right wrist views while executing this instruction: {task}"
        action_prompt_template: "A video recorded from a robot's point of view executing the following instruction: {first_line}"
        override_instruction: null
        fallback_on_error: false
        processor: *robotwin_processor

val:
  _target_: fastwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
    - ./data/robotwin2.0/robotwin2.0
  shape_meta: *robotwin_shape_meta
  num_frames: ${data.train.num_frames}
  global_sample_stride: ${data.train.global_sample_stride}
  action_video_freq_ratio: ${data.train.action_video_freq_ratio}
  video_size: ${data.train.video_size}
  camera_key: ${data.train.camera_key}
  val_set_proportion: ${data.train.val_set_proportion}
  is_training_set: false
  pretrained_norm_stats: ${data.train.pretrained_norm_stats}
  skip_padding_as_possible: false
  concat_multi_camera: ${data.train.concat_multi_camera}
  text_embedding_cache_dir: ${data.train.text_embedding_cache_dir}
  context_len: ${data.train.context_len}
  override_instruction: null
  fallback_on_error: false
  processor: *robotwin_processor
