# @package _global_

defaults:
  - override /data: robotwin_actorseg_concat
  - override /model: fastwam
  - _self_

# dataloading
batch_size: 32
num_workers: 12
dataloader_prefetch_factor: 3
dataloader_persistent_workers: true

model:
  mot_checkpoint_mixed_attn: false

# scheduler
lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 5
max_steps: null
log_every: 1
save_every: 0
eval_every: 0

# training
gradient_accumulation_steps: 1
weight_decay: 1e-2
resume: null
